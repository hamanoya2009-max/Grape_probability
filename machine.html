<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブドウ逆算</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-header">
  <a class="back-btn" href="index.html">←</a>
  <div class="page-header__name" id="machineName">-</div>
</div>

<main>

  <div class="panel">
    <p class="panel__label">データ入力</p>
    <div class="input-grid">
      <div class="field">
        <label>総回転数</label>
        <input type="number" id="totalGames" placeholder="3000" inputmode="numeric">
      </div>
      <div class="field">
        <label>差枚数</label>
        <input type="number" id="diffCoins" placeholder="-500" inputmode="numeric">
      </div>
      <div class="field">
        <label>BIG回数</label>
        <input type="number" id="bigCount" placeholder="10" inputmode="numeric">
      </div>
      <div class="field">
        <label>REG回数</label>
        <input type="number" id="regCount" placeholder="8" inputmode="numeric">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="calculate()">CALCULATE</button>
      <button class="btn-ghost" onclick="resetAll()">リセット</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-section" id="resultSection">

    <div class="result-hero">
      <div class="result-hero__label">逆算ブドウ確率</div>
      <div class="result-hero__value" id="grapeResult">1/—</div>
      <div class="result-hero__sub" id="grapeRaw"></div>
    </div>

    <div class="table-panel">
      <div class="table-panel__header">
        <p class="panel__label" style="margin:0">設定別ブドウ確率</p>
      </div>
      <table>
        <thead>
          <tr>
            <th>設定</th>
            <th>確率</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="settingTable"></tbody>
      </table>
    </div>

    <div class="panel">
      <p class="panel__label">計算内訳</p>
      <div class="detail-row">
        <span class="detail-key">投入枚数</span>
        <span class="detail-val" id="d-insert">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">ボーナス純増</span>
        <span class="detail-val" id="d-bonus">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">小役合計獲得</span>
        <span class="detail-val" id="d-yakuTotal">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">リプレイ獲得推定</span>
        <span class="detail-val" id="d-replay">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">チェリー獲得推定</span>
        <span class="detail-val" id="d-cherry">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">ブドウ獲得推定</span>
        <span class="detail-val" id="d-grape">-</span>
      </div>
    </div>

  </div>

</main>

<script>
  const params     = new URLSearchParams(location.search);
  const MACHINE_ID = params.get('id') || 'neo_aim';
</script>
<script src="app.js"></script>
<script>
  const machine = MACHINES[MACHINE_ID] || MACHINES['neo_aim'];
  document.getElementById('machineName').textContent = machine.name;
  document.title = machine.name;
</script>

</body>
</html>
